---
addon变量更新规则:
  位面:
    type: |-
      {
        [位面名称: string]: {
          当前世界状态: { 人理层: string; 天道层: string; 世界状态摘要: string };
          岁月史书: {
            正史: { [演变纪名: string]: 正史演变条目 };
            特异点: { [特异点编号: string]: 特异点条目 };
          };
          史诗传奇: { [核心母题: string]: 史诗传奇条目 };
          潜在时代演化: { [潜在时代名: string]: 潜在时代条目 };
          时代关键转折点: { [转折点事件名: string]: 转折点条目 };
        }
      }
    check:
      - 仅在后台世界演化、位面切换或跨位面事件推进时更新
      - 同一轮回复避免同时大量新增多个位面
      - |-
        因果链：重大背景事件结算 → 衍生/推进时代关键转折点 → 转折点进度完结后汇总至潜在时代演化
        → 潜在时代演化进度完结后：主线写入岁月史书.正史（演变纪），平行分歧写入特异点.事件记录（分歧纪段）
        禁止将进行中的事件/转折点直接写入正史或分歧纪段
    ${位面名称}:
      当前世界状态:
        世界状态摘要:
          format: 150~200字，描述当前世界背景在后台发生了哪些事
          check:
            - 世界后台发生重大变化时更新
      岁月史书:
        正史.${演变纪名}:
          type: |-
            {
              前时代称谓: string;
              后时代称谓: string;
              演变起止: string;
              描述: string;
              历史影响: string;
              关键转折: string;
            }
          演变起止:
            format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
          关键转折:
            check:
              - 关联已完结的时代关键转折点事件名
          check:
            - 仅当对应潜在时代演化进度完结后 insert，记录从A到B的关键演化定稿，非静态朝代编年
        特异点.${特异点编号}:
          分歧源头:
            check:
              - 填写引发分歧的正史演变纪名
          事件记录.${分歧纪段名}:
            type: |-
              {
                前时代称谓: string;
                后时代称谓: string;
                纪段起止: string;
                描述: string;
                历史影响: string;
                关键转折: string;
              }
            纪段起止:
              format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
            关键转折:
              check:
                - 填写引发该纪段与正史产生分歧的关键转折点事件名
            check:
              - 平行线上的演变型纪段，记录同一潜在时代的非主线结果；同一潜在时代可有多条平行分歧纪段
      史诗传奇.${核心母题}:
        核心母题关键词:
          check:
            - 该故事全版本共有的核心标签，首次创建母题时设定，后续少改
        传世轶闻.${流传版本名称}:
          原典:
            type: boolean
            check:
              - 该版本是否为原典，值必须为 JSON 布尔
          关键要素:
            check:
              - 关键角色/关联团体/关键物品等
          check:
            - 新版本轶闻形成或版本流传范围变化时更新
      潜在时代演化.${潜在时代名}:
        开始日期:
          format: 纪元/年号-YYYY年-MM月-DD日
        进度:
          format: Completion %（如 45%）
        状态:
          format: 萌芽 | 发展 | 临界
        推动因子:
          check:
            - 关联的推动因子名称或简述
        抑止因子:
          check:
            - 关联的冲突/抑止因子名称或简述
        已完结转折点事件影响.${关联事件名}:
          起止日期:
            format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
          事件脉络:
            check:
              - 总结事件链所有节点，并简述干预因子博弈如何导致该结局
        check:
          - 进行中、未入正史的潜在格局演化；进度完结后主线写入正史演变纪，平行分歧写入特异点分歧纪段
      时代关键转折点.${转折点事件名}:
        临界事件:
          type: boolean
          check:
            - 是否为临界事件，值必须为 JSON 布尔
        进度:
          format: Completion %（如 60%）
        干预态势:
          推动力:
            format: 高 | 中 | 低
          抑止力:
            format: 高 | 中 | 低
        关联潜在时代:
          check:
            - 关联的潜在时代名
        事件脉络.${事件节点编号}:
          开始日期:
            format: 纪元/年号-YYYY年-MM月-DD日
          结束日期:
            format: 纪元/年号-YYYY年-MM月-DD日
          干预方向:
            format: 推动 | 抑止
          干预强度:
            format: 高 | 中 | 低
          check:
            - 转折点事件链出现新节点或节点进展变化时更新
        check:
          - 时代级大事件推进时更新，完结后可移入潜在时代的已完结影响

  事件:
    世界背景事件:
      type: |-
        {
          [事件名: string]: {
            叙事指导: { 宏观层: string; 发展层: string; 细节层: string };
            开始日期: string;
            预计结算日期: string;
            参与角色: string;
            牵涉团体: string;
            描述: string;
            进展: string;
          }
        }
      check:
        - 后台宏观事件推进时更新，结算后 remove
    近距离事件:
      type: |-
        {
          [事件名: string]: {
            叙事指导: { 宏观层: string; 发展层: string; 细节层: string };
            开始日期: string;
            预计结算日期: string;
            参与角色: string;
            牵涉团体: string;
            描述: string;
            进展: string;
          }
        }
      check:
        - 主角可感知或参与的近距事件推进时更新，结算后 remove
    ${事件类别}.${事件名}:
      叙事指导:
        宏观层:
          check:
            - 事件主题、长期走向或命运气候变化时由 AI 更新
            - 留空直到剧情需要时再写入
        发展层:
          check:
            - 当前阶段推进趋势、冲突指向或关系变化时由 AI 更新
            - 留空直到剧情需要时再写入
        细节层:
          check:
            - 由 addon-mvu 脚本每轮自动抽取小阿卡那三牌刷新，AI 无需写入
            - 若 AI 写入细节层，同轮将被脚本覆盖
      开始日期:
        format: 纪元/年号-YYYY年-MM月-DD日
      预计结算日期:
        format: 纪元/年号-YYYY年-MM月-DD日
      参与角色:
        check:
          - 人物全名或背景集群NPC
      牵涉团体:
        check:
          - 团体名称
      进展:
        check:
          - 事件当前进展与走向，每轮有实质推进时可更新

  秘闻:
    type: |-
      {
        [秘闻名: string]: {
          时效: string;
          知情者名单: string;
          描述: string;
        }
      }
    ${秘闻名}:
      知情者名单:
        format: 无 | 仅XX（具体知情者）
      描述:
        check:
          - 事件简述，秘闻被揭露或过期时 remove
      check:
        - 仅少数角色知晓的隐藏信息，避免与传闻混淆

  传闻:
    type: |-
      {
        [传闻名: string]: {
          影响力: string;
          流传范围: string;
          真相: string;
          描述: string;
        }
      }
    ${传闻名}:
      影响力:
        format: 零星耳闻 | 圈内谈资 | 局部焦点 | 全民热议 | 文化烙印
      流传范围:
        check:
          - 具体流传的地域范围、社交圈等
      描述:
        check:
          - 当前传闻内容，随传播与发酵更新
      check:
        - 公开流通的信息，可与秘闻真相形成反差

  团体:
    世界背景团体:
      type: |-
        {
          [团体名: string]: 团体条目;
        }
      check:
        - 宏观势力格局变化时更新
    近距离团体:
      type: |-
        {
          [团体名: string]: 团体条目;
        }
      check:
        - 主角直接接触或受影响的团体变化时更新
    ${团体类别}.${团体名}:
      声誉.${官方|民间|暗域|业界}:
        format: 天怒人怨 | 声名狼藉 | 默默无闻 | 受人尊敬 | 万众敬仰
        check:
          - 该渠道对该团体的声誉评价，重大舆论事件后更新
      外交关系.${团体名称}:
        check:
          - 与该团体的外交关系描述
      权力支柱:
        type: |-
          { [权力支柱名: string]: string }
        check:
          - 新增/移除权力支柱时用 insert/remove
      核心人物.${姓名}:
        权力支柱:
          type: |-
            { [权力支柱名: string]: string }
          check:
            - 该人物代表的权力支柱
        check:
          - 核心人物任免或身份变化时更新

  因果回响:
    type: |-
      {
        [因果名: string]: {
          时效: string;
          引入契机: string;
          描述: string;
        }
      }
    ${因果名}:
      描述:
        check:
          - 因果简述，时效结束或因果兑现后 remove
      check:
        - 记录已发生事件的长期因果余波，避免与进行中的事件重复
