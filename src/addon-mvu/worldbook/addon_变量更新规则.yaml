---
addon变量更新规则:
  type: |-
    {
      [世界名称: string]: {
        降临: boolean;
        平行演化: boolean;
        刊报日期: string;
        时代快讯: {
          世界时代阶段: 世界时代阶段条目;
          世界时局演进动态: {
            演进驱动力: string;
            时代差格局: string;
            潜在时代演化: { [时代名称: string]: 潜在时代条目 };
            时代关键转折点: { [转折点事件名: string]: 转折点条目 };
          };
          岁月史书: {
            正史: { [演变纪名: string]: 正史演变条目 };
            特异点: { [特异点名称: string]: 特异点条目 };
          };
          史诗传奇: { [核心母题: string]: 史诗传奇条目 };
        };
        世界剧情态势: {
          时局动态: {
            世界背景事件: { [事件名: string]: 剧情事件条目 };
            当前区域事件: { [事件名: string]: 剧情事件条目 };
            传闻: { [传闻名: string]: 传闻条目 };
          };
          团体动态: {
            世界背景团体: { [团体名: string]: 团体条目 };
            当前区域团体: { [团体名: string]: 团体条目 };
          };
        };
        世界经济简报: 世界经济简报条目;
      }
    }
  check:
    - 仅在后台世界演化、世界切换或跨世界事件推进时更新
    - 同一轮回复避免同时大量新增多个世界
    - 冷启动：addon_data 为空或缺少目标世界键时，必须先 insert /{世界名}，禁止直接 replace 深层路径
    - 同批次深层 insert 前，父级 map 须已在 insert 世界条目的 value 中预置
    - 新增 map 子键用 insert；已存在键用 replace
    - 百分比、价格、汇率、投机指数等 schema 字段均为 string，禁止 JSON number
  ${世界名称}:
    降临:
      type: boolean
      check:
        - 世界是否对主角侧降临/可见；值必须为 JSON 布尔
    平行演化:
      type: boolean
      check:
        - 是否启用平行演化观测；值必须为 JSON 布尔
    刊报日期:
      format: 纪元/年号-YYYY年-MM月-DD日
      check:
        - 世界时间推进或刊报内容刷新时更新
    时代快讯:
      世界时代阶段:
        时代阶段:
          format: ${当前主流时代标签(非年号/纪元号)}时代
        check:
          - 世界主流时代标签或社会结构发生质变时更新各字段
      世界时局演进动态:
        演进驱动力:
          check:
            - 当前世界范围内最核心的1-2个变革动力
        时代差格局:
          check:
            - 描述主要文明区域所处的不同时代阶段及其互动基调
        潜在时代演化.${时代名称}:
          开始日期:
            format: 纪元/年号-YYYY年-MM月-DD日
          进度:
            format: Completion %（如 45%）
          状态:
            format: 萌芽 | 发展 | 临界
          推动因子:
            check:
              - 关联的推动因子名称或简述
          抑止因子:
            check:
              - 关联的冲突/抑止因子名称或简述
          已完结转折点事件影响.${关联事件名}:
            起止日期:
              format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
            最终结局:
              check:
                - 事件结局简述
            事件脉络:
              check:
                - 总结事件链所有节点，并简述干预因子博弈如何导致该结局
            时代影响:
              check:
                - 总结该事件的总体时代影响
          check:
            - 进行中、未入正史的潜在格局演化；进度完结后主线写入正史演变纪，平行分歧写入特异点分歧纪段
        时代关键转折点.${转折点事件名}:
          临界事件:
            type: boolean
            check:
              - 是否为临界事件，值必须为 JSON 布尔
          进度:
            format: Completion %（如 60%）
          干预态势:
            推动力:
              format: 高 | 中 | 低
            抑止力:
              format: 高 | 中 | 低
          关联潜在时代:
            check:
              - 关联的潜在时代名
          事件脉络.${事件节点编号}:
            开始日期:
              format: 纪元/年号-YYYY年-MM月-DD日
            结束日期:
              format: 纪元/年号-YYYY年-MM月-DD日
            干预方向:
              format: 推动 | 抑止
            干预强度:
              format: 高 | 中 | 低
            check:
              - 转折点事件链出现新节点或节点进展变化时更新
          check:
            - 时代级大事件推进时更新，完结后可移入潜在时代的已完结影响
      岁月史书:
        正史.${演变纪名}:
          type: |-
            {
              前时代称谓: string;
              后时代称谓: string;
              演变起止: string;
              描述: string;
              历史影响: string;
              关键转折: string;
            }
          演变起止:
            format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
          关键转折:
            check:
              - 关联的临界事件或关键转折点事件
          check:
            - 仅当对应潜在时代演化进度完结后 insert，记录从A到B的关键演化定稿，非静态朝代编年
        特异点.${特异点名称}:
          降临:
            type: boolean
            check:
              - 该特异点是否降临；值必须为 JSON 布尔
          分歧源头:
            check:
              - 填写引发分歧的正史演变纪名
          事件记录.${分歧纪段名}:
            type: |-
              {
                前时代称谓: string;
                后时代称谓: string;
                纪段起止: string;
                描述: string;
                历史影响: string;
                关键转折: string;
              }
            纪段起止:
              format: 纪元/年号-YYYY年-MM月-DD日 ~ 纪元/年号-YYYY年-MM月-DD日
            关键转折:
              check:
                - 引发该时代与正史产生分歧的时代关键转折点事件
            check:
              - 平行线上的演变型纪段，记录同一潜在时代的非主线结果；同一潜在时代可有多条平行分歧纪段
      史诗传奇.${核心母题}:
        基本类型:
          check:
            - 传奇故事的基本类型标签
        核心母题关键词:
          check:
            - 该故事全版本共有的核心标签（单个 string，逗号分隔），首次创建母题时设定，后续少改
        史实真相:
          check:
            - 该传奇背后的史实真相简述
        流变历程:
          check:
            - 总结如何从事实变成传闻，又经过多轮演变，最终升华为传奇故事的历程
        传世轶闻.${流传版本名称}:
          原典:
            type: boolean
            check:
              - 该版本是否为原典，值必须为 JSON 布尔
          关键要素:
            check:
              - 关键角色/关联团体/关键物品等
          check:
            - 新版本轶闻形成或版本流传范围变化时更新
    世界剧情态势:
      时局动态:
        世界背景事件:
          type: |-
            {
              [事件名: string]: {
                叙事指导: { 宏观层: string; 发展层: string; 细节层: string };
                参与角色: string;
                牵涉团体: string;
                事件脉络: { [日期: string]: string };
                结算条件: string;
              }
            }
          check:
            - 后台宏观事件推进时更新，结算后 remove
            - 维护总数 ≤ 5；不足 2 时可派生；超出则移除价值最低者
        当前区域事件:
          type: |-
            {
              [事件名: string]: {
                叙事指导: { 宏观层: string; 发展层: string; 细节层: string };
                参与角色: string;
                牵涉团体: string;
                事件脉络: { [日期: string]: string };
                结算条件: string;
              }
            }
          check:
            - 主角可感知或参与的当前区域事件推进时更新，结算后 remove
            - 维护总数 ≤ 3；不足 2 时可派生；超出则移除价值最低者
        ${事件类别}.${事件名}:
          叙事指导:
            宏观层:
              check:
                - 事件主题、长期走向或命运气候变化时更新
            发展层:
              check:
                - 当前阶段推进趋势、冲突指向或关系变化时更新
            细节层:
              check:
                - 可写入细节层叙事指导
          参与角色:
            check:
              - 人物全名或背景集群NPC
          牵涉团体:
            check:
              - 团体名称
          事件脉络.${日期}:
            format: 纪元/年号-YYYY年-MM月-DD日 作为键；值为该日事件进展与走向描述
            check:
              - 事件有实质推进时 insert/replace 对应日期节点
          结算条件:
            check:
              - 1至3条该事件完成/关闭的条件
        传闻.${传闻名}:
          影响力:
            format: 零星耳闻 | 圈内谈资 | 局部焦点 | 全民热议 | 文化烙印
          流传范围:
            check:
              - 具体流传的地域范围、社交圈等
          流变历程.${流变节点编号}:
            流变日期:
              format: 纪元/年号-YYYY年-MM月-DD日
            预计时效:
              format: 纪元/年号-YYYY年-MM月-DD日
            真相:
              check:
                - 该阶段传闻背后的客观真相
            传闻描述:
              check:
                - 该阶段流传的传闻梗概、关键细节
            事实偏差:
              check:
                - 该阶段传闻与真相认知之间的具体差异
            流变诱因:
              check:
                - 推动该阶段认知变化的事件与具体流变过程
          check:
            - 公开流通的信息，传闻发酵或认知变化时更新流变节点
            - 维护总数 ≤ 5；不足 2 时可派生；超出则移除价值最低者
            - 影响力达文化烙印时可总结至史诗传奇后 remove
      团体动态:
        世界背景团体:
          check:
            - 宏观势力格局变化时更新
            - 维护总数 ≤ 5；超出则移除关联性/活跃度最低者
        当前区域团体:
          check:
            - 主角当前区域直接接触或受影响的团体变化时更新
            - 维护总数 ≤ 5；超出则移除关联性/活跃度最低者
        ${团体类别}.${团体名}:
          声誉.${官方|民间|暗域|业界}:
            format: 天怒人怨 | 声名狼藉 | 默默无闻 | 受人尊敬 | 万众敬仰
            check:
              - 该渠道对该团体的声誉评价，重大舆论事件后更新
          外交关系.${团体名称}:
            check:
              - 与该团体的外交关系描述
          权力支柱:
            type: |-
              { [权力支柱名: string]: string }
            check:
              - 新增/移除权力支柱时用 insert/remove
          活跃区域:
            check:
              - 团体当前主要活动区域
          核心人物.${姓名}:
            权力支柱:
              type: |-
                { [权力支柱名: string]: string }
              check:
                - 该人物代表的权力支柱
            check:
              - 核心人物任免或身份变化时更新
    世界经济简报:
      check:
        - 刊报周期内经济气候、市场或贸易发生实质变化时更新；避免每轮无意义微调
      世界经济气候:
        整体周期相位:
          format: 繁荣 | 衰退 | 萧条 | 复苏，可简述主要驱动
        主要贸易区状态.${区域}:
          状态:
            format: 扩张 | 停滞 | 收缩
          主导产业:
            check:
              - 产业名
          需求品类:
            check:
              - 粮食/矿产/奢侈品等
      大宗商品市场:
        粮食:
          供需:
            format: 紧缺 | 过剩 | 平稳
          主要影响因素:
            check:
              - 气候/战争/政策等
          价格趋势:
            format: ↑ | ↓ | →
        矿产:
          供需:
            format: 紧缺 | 过剩 | 平稳
          重点品种:
            check:
              - 铁/铜/银等
          价格趋势:
            format: ↑ | ↓ | →
        能源:
          供需:
            format: 紧缺 | 过剩 | 平稳
          类型:
            check:
              - 木材/煤炭/石油等
          价格趋势:
            format: ↑ | ↓ | →
      货币与金融:
        基准计价单位:
          check:
            - Unit 基准计价单位名与代表符号
        流通货币.${流通货币名}:
          汇率:
            本期:
              format: 1 ${Currency} = ${X.XX} ${基准计价单位符号}
            上期:
              format: 1 ${Currency} = ${Y.YY} ${基准计价单位符号}
            涨跌:
              format: ↑+Z.ZZ% | ↓-Z.ZZ% | →0%
          市场情绪:
            format: 看涨 | 看跌 | 震荡 | 稳定等
          驱动因素:
            check:
              - 贸易顺差/战争风险/央行干预/投机等
        汇率波动指数:
          综合汇率波动率:
            format: 低 | 中 | 高
          主要影响因素:
            check:
              - 影响因素描述
        信贷环境:
          状态:
            format: 宽松 | 紧缩等
          金融机构风险:
            format: 稳定 | 局部危机 | 系统性风险等
      投机市场:
        市场整体情绪:
          format: 狂热 | 乐观 | 谨慎 | 恐慌 | 萧条等
        主要交易标的.${标的名称}:
          类型:
            format: 股票 | 期货 | 期权 | 份额等
          当前价格:
            format: ${X.XX} ${基准计价单位符号}
          上期价格:
            format: ${Y.YY} ${基准计价单位符号}
          涨跌:
            format: ↑/↓/→ ${Z.ZZ%}
          交易热度:
            format: 高 | 中 | 低
          量能:
            format: 放量 | 缩量 | 平量
          驱动事件:
            check:
              - 如新矿发现/战争威胁/政策利好/恐慌抛售等
        期货合约.${商品名}:
          近月价格:
            format: ${X.XX} ${基准计价单位符号}
          远月价格:
            format: ${Y.YY} ${基准计价单位符号}
          基差:
            format: 升水 | 贴水 | 平水
        投机指数:
          报:
            format: 数值字符串
          周涨跌:
            format: ↑+Z.ZZ% | ↓-Z.ZZ% | →0%
      贸易格局:
        主要商路.${商路名}:
          状态:
            format: 畅通 | 受阻
          原因:
            check:
              - 海盗/战争/关税等
        贸易政策.${势力名}:
          check:
            - 降低关税/禁运/补贴等
      经济事件.${事件名}:
        描述:
          check:
            - 某地饥荒/某家族破产/某行业暴利等
        影响维度:
          check:
            - 经济/社会/政治等
        当前态势:
          format: 恶化 | 受控 | 转折等
        check:
          - 事件结束或影响消退后 remove
          - 活跃经济事件上限不超过 5 个
