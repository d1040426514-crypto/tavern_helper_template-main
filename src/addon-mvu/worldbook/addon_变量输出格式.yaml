WorldPaper_Update_Format: |-
  你必须仅输出一个合法 JSON 对象（不要 markdown 围栏，不要 XML，不要自然语言前后缀）。
  
  ## 业务约束
  - patch 为 JSON Patch (RFC 6902) 风格数组，支持：replace、delta、insert、remove、move
  - 新增对象键（事件名、传闻名、团体名等）用 insert，path 末段写新键名
  - path 相对当前变量树根，第一段必须是世界名（如 `/某世界/刊报日期`）；禁止 `/刊报日期` 这类缺世界前缀的路径
  - 禁止更新以 `_` 开头的只读字段
  - 布尔字段必须是 JSON true/false，不能是 "true"/"false" 字符串
  
  ## 字段类型约束
  - `进度`（潜在时代演化、时代关键转折点）：必须是字符串，如 `"5%"`，禁止 JSON number
  - `核心母题关键词`：单个 string（逗号分隔标签），禁止 JSON array
  - `权力支柱`（团体与核心人物）：必须是 `{ "支柱名": "状态描述" }`；核心人物层禁止写支柱名字符串
  - 价格、汇率（本期/上期/涨跌）、投机指数 `报`、周涨跌等：一律 string，禁止裸 number
  
  ## 叙事指导格式约束
  - 事件 `叙事指导` 必须直接采用 `<占卜池>` 中同一组占卜结果原文，不要改写成解释句、剧情总结或抽象描述
  - `宏观层`：填写 1 个易经卦象，格式为 `卦象符号·卦名`，如 `"䷿·未济"`
  - `发展层`：填写 1 组大阿卡那原文，按原顺序保留，使用 `、` 连接，逆位保留 `(逆位)`，如 `"皇帝(逆位)、节制、力量(逆位)"`
  - `细节层`：填写 1 组小阿卡那原文，按原顺序保留，使用 `、` 连接，逆位保留 `(逆位)`，如 `"星币五、星币四、权杖侍从(逆位)"`
  
  ## 初始化与世界创建
  执行 patch 前阅读 `<上期世界状态>`。若 `<上期世界状态>` 为 空，或不存在本轮目标世界名，视为**冷启动**。
  
  冷启动硬性规则：
  1. **禁止**在空根上直接 `replace` 或深层 `insert` 子字段（如 `/某世界/刊报日期`）。
  2. **第一条** patch 必须是：`insert /{当前世界名}`，`value` 为完整世界条目骨架（见下），并在骨架中填入本批要写的初始值。
  3. 同批次若还要写深层字段，骨架中须预先包含对应父级 map（如 `时代快讯.岁月史书.正史: {}`），否则后续 `insert /.../正史/新键` 仍会失败。
  4. 世界键已存在但某 map 子键不存在时：对该层用 **insert**（末段为新键名）；仅当键已存在时用 **replace**。
  
  世界条目骨架（`insert /某世界` 的 value 模板，可按需填入初始值）：
  {
    "降临": false,
    "平行演化": false,
    "刊报日期": "",
    "时代快讯": {
      "世界时代阶段": {
        "时代阶段": "",
        "核心社会组织形式": "",
        "主流世界观与思潮": "",
        "主要经济模式": "",
        "技术特征": "",
        "主导性能源与动力": "",
        "关键材料标志": "",
        "社会阶级结构": "",
        "生产力与生产关系矛盾": "",
        "世界秩序格局": ""
      },
      "世界时局演进动态": {
        "演进驱动力": "",
        "时代差格局": "",
        "潜在时代演化": {},
        "时代关键转折点": {}
      },
      "岁月史书": { "正史": {}, "特异点": {} },
      "史诗传奇": {}
    },
    "世界剧情态势": {
      "时局动态": {
        "世界背景事件": {},
        "当前区域事件": {},
        "传闻": {}
      },
      "团体动态": {
        "世界背景团体": {},
        "当前区域团体": {}
      }
    },
    "世界经济简报": {
      "世界经济气候": { "整体周期相位": "", "主要贸易区状态": {} },
      "大宗商品市场": {
        "粮食": { "供需": "", "主要影响因素": "", "价格趋势": "" },
        "矿产": { "供需": "", "重点品种": "", "价格趋势": "" },
        "能源": { "供需": "", "类型": "", "价格趋势": "" }
      },
      "货币与金融": {
        "基准计价单位": "",
        "流通货币": {},
        "汇率波动指数": { "综合汇率波动率": "", "主要影响因素": "" },
        "信贷环境": { "状态": "", "金融机构风险": "" }
      },
      "投机市场": {
        "市场整体情绪": "",
        "主要交易标的": {},
        "期货合约": {},
        "投机指数": { "报": "", "周涨跌": "" }
      },
      "贸易格局": { "主要商路": {}, "贸易政策": {} },
      "经济事件": {}
    }
  }
  
  ## analysis
  - 语言：中文
  - 必须完整执行 `<analysis_format>` 思维步骤，不得删减
  - Step 0 须检查 `<上期世界状态>`：若目标世界不存在，在 Step 9 规划 `insert /世界名` 为 patch 第一条，并列出本批需预置的父级 map
  - 允许较长文本；换行用 \n；引号按 JSON 转义
  
  ## 根对象结构
  
  冷启动示例（`<上期世界状态>` 为空或缺少目标世界时）：
  {
    "analysis": "身份确认……\nStep 0: ……\n……\nStep 8: 首条 insert /某世界 带骨架与初始值……",
    "patch": [
      {
        "op": "insert",
        "path": "/某世界",
        "value": {
          "降临": true,
          "平行演化": false,
          "刊报日期": "纪元-YYYY年-MM月-DD日",
          "时代快讯": {
            "世界时代阶段": { "时代阶段": "某时代" },
            "世界时局演进动态": {
              "演进驱动力": "……",
              "时代差格局": "……",
              "潜在时代演化": {
                "某时代": { "开始日期": "纪元-YYYY年-MM月-DD日", "进度": "5%", "状态": "萌芽", "推动因子": "", "抑止因子": "", "描述": "", "已完结转折点事件影响": {} }
              },
              "时代关键转折点": {}
            },
            "岁月史书": { "正史": {}, "特异点": {} },
            "史诗传奇": {}
          },
          "世界剧情态势": {
            "时局动态": { "世界背景事件": {}, "当前区域事件": {}, "传闻": {} },
            "团体动态": {
              "世界背景团体": {
                "某商会": {
                  "声誉": { "官方": "受人尊敬", "民间": "默默无闻", "暗域": "声名狼藉", "业界": "受人尊敬" },
                  "外交关系": {},
                  "权力支柱": { "贸易许可": "控制货物进出权" },
                  "活跃区域": "",
                  "内政概况": "",
                  "发展态势": "",
                  "当前动态": "",
                  "核心人物": {
                    "某会长": {
                      "身份职务": "会长",
                      "权力支柱": { "贸易许可": "控制货物进出权" }
                    }
                  }
                }
              },
              "当前区域团体": {}
            }
          },
          "世界经济简报": {}
        }
      },
      {
        "op": "insert",
        "path": "/某世界/世界剧情态势/时局动态/世界背景事件/新事件",
        "value": {
          "叙事指导": {
            "宏观层": "",
            "发展层": "",
            "细节层": ""
          },
          "参与角色": "",
          "牵涉团体": "",
          "事件脉络": {},
          "结算条件": ""
        }
      }
    ]
  }
  
  常规更新示例（目标世界已存在时）：
  {
    "analysis": "身份确认……\nStep 0: ……\n……\nStep 8: ……",
    "patch": [
      { "op": "replace", "path": "/某世界/刊报日期", "value": "纪元-YYYY年-MM月-DD日" },
      { "op": "replace", "path": "/某世界/降临", "value": true },
      { "op": "replace", "path": "/某世界/世界剧情态势/团体动态/世界背景团体/某商会/核心人物/某会长/权力支柱", "value": { "贸易许可": "控制货物进出权" } },
      { "op": "insert", "path": "/某世界/世界剧情态势/时局动态/世界背景事件/新事件", "value": { "叙事指导": { "宏观层": "", "发展层": "", "细节层": "" }, "参与角色": "", "牵涉团体": "", "事件脉络": {}, "结算条件": "" } },
      { "op": "move", "from": "/某世界/path/from", "to": "/某世界/path/to" }
    ]
  }