WorldPaper_Update_Format: |-
  你必须仅输出一个合法 JSON 对象（不要 markdown 围栏，不要 XML，不要自然语言前后缀）。
  
  ## 业务约束
  - patch 为 JSON Patch (RFC 6902) 风格数组，支持：replace、delta、insert、remove、move
  - 新增对象键（事件名、传闻名、团体名等）用 insert，path 末段写新键名
  - path 相对当前变量树根，第一段必须是世界名（如 `/某世界/刊报日期`）；禁止 `/刊报日期` 这类缺世界前缀的路径
  - 禁止更新以 `_` 开头的只读字段
  - 布尔字段必须是 JSON true/false，不能是 "true"/"false" 字符串
  
  ## 字段类型约束
  - `进度`（潜在时代演化、时代关键转折点）：必须是字符串，如 `"5%"`，禁止 JSON number
  - `核心母题关键词`：单个 string（逗号分隔标签），禁止 JSON array
  - `权力支柱`（团体与核心人物）：必须是 `{ "支柱名": "状态描述" }`；核心人物层禁止写支柱名字符串
  - 价格、汇率（本期/上期/涨跌）、投机指数 `报`、周涨跌等：一律 string，禁止裸 number
  
  ## 叙事指导格式约束
  - 事件 `叙事指导` 必须直接采用 `<占卜池>` 中同一组占卜结果原文，不要改写成解释句、剧情总结或抽象描述
  - `宏观层`：填写 1 个易经卦象，格式为 `卦象符号·卦名`，如 `"䷿·未济"`
  - `发展层`：填写 1 组大阿卡那原文，按原顺序保留，使用 `、` 连接，逆位保留 `(逆位)`，如 `"皇帝(逆位)、节制、力量(逆位)"`
  - `细节层`：填写 1 组小阿卡那原文，按原顺序保留，使用 `、` 连接，逆位保留 `(逆位)`，如 `"星币五、星币四、权杖侍从(逆位)"`
  
  ## 世界键与 patch 纪律
  - 世界根键由外部脚本控制台创建；**禁止**对仅一段的 path（`/{世界名}`）执行 insert / replace / remove / move
  - 执行 patch 前阅读 `<上期世界状态>`。若为空或不存在本轮目标世界：输出 `patch: []`
  - 世界已存在时：map 子键不存在用 **insert**（末段为新键名），已存在用 **replace**；深层 insert 前父级 map 须已存在
  
  ## analysis
  - 语言：中文
  - 必须完整执行 `<analysis_format>` 思维步骤，不得删减
  - Step 0 须检查 `<上期世界状态>`：若目标世界不存在，Step 9 输出空 patch，勿规划 `insert /世界名`
  - 允许较长文本；换行用 \n；引号按 JSON 转义
  
  ## 根对象结构
  
  目标世界缺失时：
  {
    "analysis": "身份确认……\nStep 0: 目标世界不存在，需VOID在控制台新建……\n……\nStep 8: 本轮 patch 为空……",
    "patch": []
  }
  
  常规更新示例（目标世界已存在时）：
  {
    "analysis": "身份确认……\nStep 0: ……\n……\nStep 8: ……",
    "patch": [
      { "op": "replace", "path": "/某世界/刊报日期", "value": "纪元-YYYY年-MM月-DD日" },
      { "op": "replace", "path": "/某世界/世界剧情态势/团体动态/世界背景团体/某商会/核心人物/某会长/权力支柱", "value": { "贸易许可": "控制货物进出权" } },
      { "op": "insert", "path": "/某世界/世界剧情态势/时局动态/世界背景事件/新事件", "value": { "叙事指导": { "宏观层": "", "发展层": "", "细节层": "" }, "参与角色": "", "牵涉团体": "", "事件脉络": {}, "结算条件": "" } },
      { "op": "move", "from": "/某世界/path/from", "to": "/某世界/path/to" }
    ]
  }
